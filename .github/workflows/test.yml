name: Insight Service CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint, types, secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-insight.txt

      - name: Install lint + type tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-insight.txt
          pip install ruff==0.7.4 mypy==1.13.0

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy --ignore-missing-imports --check-untyped-defs app/insights/

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      # gitleaks scans working tree only (`dir`), not history (`git`).
      # Old voiceiq-AI*.zip blobs in history carry rotated/dead tokens
      # (purge deferred to Tier 4). Pre-commit gates new commits; CI
      # mirrors that scope.
      - name: Gitleaks secret scan (working tree)
        run: gitleaks dir . --no-banner --redact

  test:
    name: Run Insight Service unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-insight.txt

      - name: Install lightweight insight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-insight.txt

      - name: Run insight tests
        run: |
          pytest -v app/insights/tests/
        env:
          PYTHONPATH: .
