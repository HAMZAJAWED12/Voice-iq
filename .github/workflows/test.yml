name: Insight Service Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Insight Service unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-insight.txt

      - name: Install lightweight insight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-insight.txt

      - name: Run insight tests
        run: |
          pytest -v app/insights/tests/
        env:
          PYTHONPATH: .
