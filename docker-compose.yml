# =============================================================================
# VoiceIQ Insight Service — local / single-host orchestration.
#
#   docker compose up --build         # build + run in foreground
#   docker compose up -d              # detached
#   docker compose logs -f voiceiq-app
#   docker compose down               # stop + remove (volume persists)
#   docker compose down -v            # also drop the SQLite volume
#
# Requires a `.env` file in the repo root. Start from the template:
#   cp .env.example .env
# Empty values are fine in dev — fact-check clients without a key return
# SOURCE_UNAVAILABLE rather than crashing.
# =============================================================================

services:
  voiceiq-app:
    build:
      context: .
      args:
        PYTHON_VERSION: "3.11"
    image: voiceiq-insight:dev
    container_name: voiceiq-app
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - voiceiq-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8888/healthz', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  voiceiq-data:
